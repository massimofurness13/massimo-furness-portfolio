    <line x1="431" y1="320" x2="461" y2="320"/>
    <line x1="476" y1="335" x2="502" y2="335"/>
    <line x1="517" y1="305" x2="553" y2="305"/>
    <line x1="568" y1="315" x2="598" y2="315"/>
    <line x1="613" y1="330" x2="641" y2="330"/>
    <line x1="656" y1="320" x2="688" y2="320"/>
