    <rect x="377" y="190" width="44" height="210" fill="none"/>
    <rect x="426" y="220" width="40" height="180" fill="none"/>
    <rect x="471" y="240" width="36" height="160" fill="none"/>
    <rect x="512" y="200" width="46" height="200" fill="none"/>
    <rect x="563" y="215" width="40" height="185" fill="none"/>
    <rect x="608" y="235" width="38" height="165" fill="none"/>
    <rect x="651" y="225" width="42" height="175" fill="none"/>
