<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="500" fill="#f5f2ec"/>
  <!-- grid -->
  <g stroke="#14110d" stroke-width="0.5" opacity="0.1">
    <line x1="80" y1="120" x2="720" y2="120"/>
    <line x1="80" y1="180" x2="720" y2="180"/>
    <line x1="80" y1="240" x2="720" y2="240"/>
    <line x1="80" y1="300" x2="720" y2="300"/>
    <line x1="80" y1="360" x2="720" y2="360"/>
  </g>
  <!-- axes -->
  <line x1="80" y1="420" x2="720" y2="420" stroke="#14110d" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="420" stroke="#14110d" stroke-width="1"/>
  <!-- candles: x, wick top, wick bottom, body top, body bottom, fill -->
  <g stroke="#14110d" stroke-width="1">
    <!-- 1 down -->
    <line x1="120" y1="180" x2="120" y2="280"/>
    <rect x="113" y="200" width="14" height="60" fill="#14110d"/>
    <!-- 2 up -->
    <line x1="160" y1="170" x2="160" y2="290"/>
    <rect x="153" y="210" width="14" height="50" fill="#f5f2ec"/>
    <!-- 3 up -->
    <line x1="200" y1="180" x2="200" y2="270"/>
    <rect x="193" y="200" width="14" height="55" fill="#f5f2ec"/>
    <!-- 4 down -->
    <line x1="240" y1="190" x2="240" y2="320"/>
    <rect x="233" y="220" width="14" height="80" fill="#14110d"/>
    <!-- 5 down -->
    <line x1="280" y1="240" x2="280" y2="360"/>
    <rect x="273" y="270" width="14" height="70" fill="#14110d"/>
    <!-- 6 down -->
    <line x1="320" y1="290" x2="320" y2="380"/>
    <rect x="313" y="320" width="14" height="50" fill="#14110d"/>
    <!-- 7 up -->
    <line x1="360" y1="280" x2="360" y2="380"/>
    <rect x="353" y="310" width="14" height="60" fill="#f5f2ec"/>
    <!-- 8 up -->
    <line x1="400" y1="240" x2="400" y2="340"/>
    <rect x="393" y="260" width="14" height="65" fill="#f5f2ec"/>
    <!-- 9 up -->
    <line x1="440" y1="200" x2="440" y2="310"/>
    <rect x="433" y="220" width="14" height="75" fill="#f5f2ec"/>
    <!-- 10 down -->
    <line x1="480" y1="190" x2="480" y2="270"/>
    <rect x="473" y="210" width="14" height="50" fill="#14110d"/>
    <!-- 11 up -->
    <line x1="520" y1="160" x2="520" y2="240"/>
    <rect x="513" y="170" width="14" height="60" fill="#f5f2ec"/>
    <!-- 12 up -->
    <line x1="560" y1="120" x2="560" y2="200"/>
    <rect x="553" y="135" width="14" height="55" fill="#f5f2ec"/>
    <!-- 13 down -->
    <line x1="600" y1="115" x2="600" y2="180"/>
    <rect x="593" y="125" width="14" height="40" fill="#14110d"/>
    <!-- 14 up -->
    <line x1="640" y1="100" x2="640" y2="180"/>
    <rect x="633" y="110" width="14" height="55" fill="#f5f2ec"/>
  </g>
  <!-- moving avg dashed -->
  <path d="M 120 230 C 200 235 280 320 360 340 S 520 200 640 130" fill="none" stroke="#d2778e" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.85"/>
  <!-- price label -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#14110d" opacity="0.6">
    <text x="60" y="123" text-anchor="end">128</text>
    <text x="60" y="183" text-anchor="end">120</text>
    <text x="60" y="243" text-anchor="end">112</text>
    <text x="60" y="303" text-anchor="end">104</text>
    <text x="60" y="363" text-anchor="end">96</text>
  </g>
</svg>
