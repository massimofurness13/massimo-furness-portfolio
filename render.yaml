services:
  - type: web
    runtime: static
    name: massimo-furness-portfolio
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    autoDeploy: true
    headers:
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /projects/*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /:path*
        destination: /:path*.html
